name: saif new
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  gartic-bot:
    runs-on: ubuntu-24.04
    timeout-minutes: 1000
    strategy:
      fail-fast: false
      matrix:
        instance: [1, 2, 3, 4]
    steps:
      - name: 1. Aggressive system tuning
        continue-on-error: true
        run: |
          set +e
          echo "=== Linux system tuning ==="

          for svc in snapd snapd.socket unattended-upgrades udisks2 \
                     packagekit ModemManager rsyslog avahi-daemon; do
              sudo systemctl stop "$svc" 2>/dev/null || true
              sudo systemctl disable "$svc" 2>/dev/null || true
          done

          for tmr in apt-daily.timer apt-daily-upgrade.timer logrotate.timer; do
              sudo systemctl stop "$tmr" 2>/dev/null || true
              sudo systemctl disable "$tmr" 2>/dev/null || true
          done

          for f in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
              [ -w "$f" ] && echo performance | sudo tee "$f" >/dev/null 2>&1 || true
          done

          sudo sysctl -w net.core.default_qdisc=fq 2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr 2>/dev/null || true
          sudo sysctl -w net.core.rmem_max=67108864 2>/dev/null || true
          sudo sysctl -w net.core.wmem_max=67108864 2>/dev/null || true
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1 2>/dev/null || true

          pgrep -f 'Runner' | xargs -r -I{} sudo renice -n 19 -p {} 2>/dev/null || true
          echo "=== System tuning complete ==="

      - name: 2. Setup Camoufox directory
        run: |
          sudo mkdir -p /opt/camoufox
          sudo chown "$USER:$USER" /opt/camoufox
          echo "Directory created"

      - name: 3. Cache Camoufox & venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/camoufox
            /opt/camoufox/venv
          key: camoufox-cache-ubuntu-v2
          restore-keys: |
            camoufox-cache-ubuntu-

      - name: 4. Install Python deps
        working-directory: /opt/camoufox
        run: |
          sudo apt-get update -qq 2>/dev/null || true
          sudo apt-get install -y --no-install-recommends \
              libgtk-3-0 libxt6 libdbus-glib-1-2 libpci3 \
              libxss1 libnss3 libasound2t64 fonts-liberation 2>/dev/null || true

          if [ ! -d venv ]; then
              python3 -m venv venv
              ./venv/bin/pip install -q --upgrade pip
              ./venv/bin/pip install -q camoufox aiohttp
              echo "Created new venv"
          else
              echo "Using cached venv"
          fi

      - name: 5. Fetch Camoufox
        working-directory: /opt/camoufox
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
              echo "Attempt $attempt/3..."
              if ./venv/bin/python -m camoufox fetch 2>&1; then
                  echo "Success"
                  exit 0
              fi
              if [ $attempt -lt 3 ]; then
                  echo "Waiting 30s..."
                  sleep 30
              fi
          done
          exit 1

      - name: 6. Create generator
        working-directory: /opt/camoufox
        run: |
          python3 << 'PYSCRIPT'
import asyncio
import aiohttp
from camoufox.async_api import AsyncCamoufox

MOONFIIVE_URL = "https://lm9wd.alwaysdata.net/add-token"
TARGET_URL = "https://gartic.io"
SITEKEY = "0x4AAAAAAAABBPKA"

NUM_BROWSERS = 1
NUM_TABS = 6
BROWSER_LIFETIME_MS = 50 * 60_000

_level_counts = {"0": 0, "1": 0, "other": 0}

async def _post_token(session, token):
    try:
        async with session.post(MOONFIIVE_URL, json={"token": token}) as resp:
            await resp.read()
    except:
        pass

async def _route_handler(route):
    request = route.request
    if request.resource_type == "document":
        await route.continue_()
        return
    if "challenges.cloudflare.com" in request.url:
        await route.continue_()
        return
    await route.abort()

async def setup_tab(page, tab_id, session):
    def on_console(msg):
        text = msg.text
        if text.startswith("T:"):
            token = text[2:]
            level = token[0] if token and token[1:2] == "." else "other"
            if level in _level_counts:
                _level_counts[level] += 1
            else:
                _level_counts["other"] += 1
            print(f"[tab {tab_id}] Token | L1:{_level_counts['1']} L0:{_level_counts['0']}")
            asyncio.create_task(_post_token(session, token))

    page.on("console", on_console)
    await page.route("**/*", _route_handler)

    try:
        await page.goto(TARGET_URL, wait_until="domcontentloaded", timeout=60000)
    except:
        pass
    
    await asyncio.sleep(0.5)

    async def reload_loop():
        while not page.is_closed():
            await asyncio.sleep(3600)
            if page.is_closed():
                return
            try:
                await page.reload(wait_until="domcontentloaded", timeout=60000)
            except:
                pass

    asyncio.create_task(reload_loop())

async def run_browser(browser_num, session):
    while True:
        try:
            print(f"[browser {browser_num}] launching...")
            async with AsyncCamoufox(
                headless=True,
                disable_coop=True,
                humanize=False,
            ) as browser:
                for i in range(NUM_TABS):
                    context = await browser.new_context()
                    page = await context.new_page()
                    asyncio.create_task(setup_tab(page, f"{browser_num}.{i+1}", session))
                    if i < NUM_TABS - 1:
                        await asyncio.sleep(2)
                await asyncio.sleep(BROWSER_LIFETIME_MS / 1000)
                print(f"[browser {browser_num}] recycling...")
        except Exception as e:
            print(f"[browser {browser_num}] error: {e}")
            await asyncio.sleep(5)

async def main():
    async with aiohttp.ClientSession() as session:
        tasks = []
        for b in range(NUM_BROWSERS):
            tasks.append(asyncio.create_task(run_browser(b + 1, session)))
        await asyncio.gather(*tasks, return_exceptions=True)

if __name__ == "__main__":
    asyncio.run(main())
PYSCRIPT
          echo "Generator created"

      - name: 7. Run generator
        working-directory: /opt/camoufox
        continue-on-error: true
        run: |
          sudo renice -n -20 -p $$ >/dev/null 2>&1 || true
          sudo ionice -c 1 -n 0 -p $$ >/dev/null 2>&1 || true
          python3 << 'PYSCRIPT'
